<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brawl Stars Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Brawl Tracker
  </div>
  <div id="user-badge">
    <span id="badge-name"></span>
    <span class="tag-pill" id="badge-tag"></span>
    <button id="logout-btn" onclick="logout()">Esci</button>
  </div>
</header>

<main>

  <div id="login-section">
    <p class="login-heading">Accedi con il tuo tag</p>
    <p class="login-sub">Inserisci il tag del tuo account Brawl Stars</p>
    <div class="input-row">
      <input type="text" id="login-tag" placeholder="#TUOTAG" />
      <button class="primary" onclick="doLogin()">Entra</button>
    </div>
    <div id="login-alert"></div>
  </div>

  <div id="dashboard" style="display:none;">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('profilo')">Il mio profilo</button>
      <button class="tab" onclick="switchTab('search')">Ricerca player</button>
      <button class="tab" onclick="switchTab('following')">Preferiti</button>
      <button class="tab" onclick="switchTab('builds')">Le mie build</button>
      <button class="tab" onclick="switchTab('top')">Top build</button>
    </div>

    <div class="tab-panel active" id="tab-profilo">
      <div id="profilo-content"></div>
    </div>

    <div class="tab-panel" id="tab-search">
      <div class="search-row">
        <input type="text" id="search-tag" placeholder="#TAG da cercare" style="max-width:220px;" />
        <button class="primary" onclick="doSearch()">Cerca</button>
      </div>
      <div id="search-result"></div>
      <div id="club-panel" style="display:none;">
        <button class="back-btn" onclick="hideClub()">← Torna al player</button>
        <div id="club-content"></div>
      </div>
    </div>

    <div class="tab-panel" id="tab-following">
      <div id="following-list">
        <div class="empty-state">Nessun preferito salvato.</div>
      </div>
    </div>

    <div class="tab-panel" id="tab-builds">
      <div class="card">
        <div class="section-title">Crea nuova build</div>
        <div class="build-form">
          <div class="form-group">
            <label>Brawler</label>
            <select id="build-brawler" onchange="onBrawlerChange()">
              <option value="">— Seleziona —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Starpower</label>
            <select id="build-starpower">
              <option value="">— Nessuna —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Gadget</label>
            <select id="build-gadget">
              <option value="">— Nessuno —</option>
            </select>
          </div>
        </div>
        <button class="primary" onclick="saveBuild()">Salva build</button>
        <div id="build-alert"></div>
      </div>
      <div class="section-title" style="margin-top:1.5rem;">Build salvate</div>
      <div id="builds-list">
        <div class="empty-state">Nessuna build salvata.</div>
      </div>
    </div>

    <!-- TAB: TOP BUILD -->
    <div class="tab-panel" id="tab-top">
      <div id="top-list">
        <div class="empty-state">Caricamento…</div>
      </div>
    </div>

  </div>
</main>

<script src="app.js"></script>
</body>
</html>
